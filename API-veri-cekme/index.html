<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <div class="konu">
        <h3>7️⃣ API (Fetch)</h3>
        <button onclick="apiTest()">Veri Çek</button>
        <div id="test7"></div>
    </div>
    
</body>

<script>
    function apiTest(){
        fetch('https://jsonplaceholder.typicode.com/posts/1') // API'den veri çekme
        .then(response => response.json()) // Veriyi JSON formatına çevirme
        .then(data => {
            document.getElementById("test7").innerHTML = `Başlık: ${data.title} <br> İçerik: ${data.body}`; // Veriyi gösterme
        })
    }
</script>
</html>
