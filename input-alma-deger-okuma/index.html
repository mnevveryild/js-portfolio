<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <input id="isim" placeholder="adinizi yaziniz">
    <button id="gosterBtn">Goster</button>
    <p id="sonuc"></p>
    
</body>

<script>
    let input = document.getElementById("isim");
    let gosterBtn = document.getElementById("gosterBtn");
    let sonuc = document.getElementById("sonuc");

    gosterBtn.addEventListener("click", function() {
        let isim = input.value; // inputun değerini alır
        sonuc.textContent = `Merhaba, ${isim}!`; // sonucu gösterir  
    });
</script>
</html>
